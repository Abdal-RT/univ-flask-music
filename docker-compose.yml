version: '3.9'

services:
  db:
    image: mariadb:11.1
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: example
      MARIADB_DATABASE: univ_music
      MARIADB_USER: univ_user
      MARIADB_PASSWORD: univ_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    command: python app.py
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: mysql+pymysql://univ_user:univ_pass@db:3306/univ_music
      SECRET_KEY: dev-secret-key
    depends_on:
      - db
    volumes:
      - .:/workspace
    working_dir: /workspace

volumes:
  db_data:
