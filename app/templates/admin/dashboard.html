{% extends 'base.html' %}
{% block title %}Administration - Musique Actu{% endblock %}

{% block content %}
<h1>Administration</h1>
<div class="row">
  <div class="col-md-4 mb-3">
    <div class="card text-white bg-primary shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Catégories</h5>
        <p class="card-text">{{ categories }}</p>
        <a href="{{ url_for('admin.categories') }}" class="text-white">Gérer</a>
      </div>
    </div>
  </div>
  <div class="col-md-4 mb-3">
    <div class="card text-white bg-success shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Concerts</h5>
        <p class="card-text">{{ concerts }}</p>
        <a href="{{ url_for('admin.concerts_list') }}" class="text-white">Gérer</a>
      </div>
    </div>
  </div>
  <div class="col-md-4 mb-3">
    <div class="card text-white bg-warning shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Actualités</h5>
        <p class="card-text">{{ news }}</p>
        <a href="{{ url_for('admin.news_list') }}" class="text-white">Gérer</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
