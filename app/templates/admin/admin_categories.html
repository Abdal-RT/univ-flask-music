{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Gérer les Catégories</h1>
    <a href="{{ url_for('admin.add_category') }}" class="btn btn-primary">+ Ajouter</a>
</div>
<div class="table-responsive shadow-sm bg-white rounded">
  <table class="table table-striped align-middle mb-0">
    <thead class="table-dark">
      <tr><th>Titre</th><th>Description</th><th class="text-end">Actions</th></tr>
    </thead>
    <tbody>
      {% for c in categories %}
        <tr>
          <td class="fw-bold">{{ c.titre }}</td>
          <td>{{ c.description or '-' }}</td>
          <td class="text-end">
            <a href="{{ url_for('admin.edit_category', id=c.id) }}" class="btn btn-sm btn-outline-secondary">Modifier</a>
            <form action="{{ url_for('admin.delete_category', id=c.id) }}" method="post" class="d-inline">
              <button class="btn btn-sm btn-outline-danger" onclick="return confirm('Sûr de vouloir supprimer ?')">Supprimer</button>
            </form>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
