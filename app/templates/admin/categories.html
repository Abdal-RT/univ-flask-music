{% extends 'base.html' %}
{% block title %}Catégories - Administration{% endblock %}

{% block content %}
<h1>Catégories</h1>
<a href="{{ url_for('admin.add_category') }}" class="btn btn-primary mb-3">Ajouter une catégorie</a>
<div class="table-responsive shadow-sm">
  <table class="table table-striped align-middle">
    <thead>
      <tr>
        <th>Titre</th>
        <th>Description</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for category in categories %}
        <tr>
          <td>{{ category.title }}</td>
          <td>{{ category.description or '-' }}</td>
          <td>
            <a href="{{ url_for('admin.edit_category', category_id=category.id) }}" class="btn btn-sm btn-outline-secondary me-2">Modifier</a>
            <form action="{{ url_for('admin.delete_category', category_id=category.id) }}" method="post" class="d-inline">
              <button class="btn btn-sm btn-outline-danger" onclick="return confirm('Supprimer cette catégorie ?')">Supprimer</button>
            </form>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
